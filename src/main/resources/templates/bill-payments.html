<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bill Payments - CoreBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6fb;
            font-family: "Segoe UI", sans-serif;
            margin: 0;
        }
        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: darkslategray;
            padding-top: 30px;
            position: fixed;
            top: 0;
            left: 0;
        }

        .sidebar a {
            display: block;
            padding: 12px 22px;
            text-decoration: none;
            color: #b3c5ff;
            font-size: 15px;
        }

        .sidebar a:hover,
        .sidebar .active {
            background: rgba(255,255,255,0.15);
            color: white;
            border-radius: 6px;
        }

        .main-content {
            margin-left: 260px;
            padding: 40px 50px;
        }
    </style>
</head>
<body>


<!-- SIDEBAR -->
<div class="sidebar">
    <h3 class="text-center text-white mb-4">CoreBank</h3>

    <a class="active" href="/dashboard">Dashboard</a>
    <a href="/accounts">Accounts</a>
    <a href="/transactions">Transactions</a>
    <a href="/loan/apply">Apply Loan</a>
    <a href="/credit-cards">Credit Cards</a>
    <a href="/bill-payments">Bill Payments</a>
    <a href="/logout">Logout</a>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="fw-bold">Bill Payments</h1>
        <a href="/bill-payments/new" class="btn btn-primary">New Bill Payment</a>
    </div>

    <!-- SUCCESS MESSAGE -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <table class="table table-striped table-bordered bg-white">
        <thead>
        <tr>
            <th>#</th>
            <th>Account</th>
            <th>Title</th>
            <th>Amount (CAD)</th>
            <th>User Id</th>
            <th>Timestamp</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${payments}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.fromAccount.accountNumber}"></td>
            <td th:text="${p.title}"></td>
            <td th:text="${p.amount}"></td>
            <td th:text="${p.userId}"></td>
            <td th:text="${#temporals.format(p.timestamp, 'yyyy-MM-dd HH:mm')}"></td>
        </tr>

        <tr th:if="${#lists.isEmpty(payments)}">
            <td colspan="6" class="text-center text-muted">No bill payments found.</td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
