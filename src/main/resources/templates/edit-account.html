<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">


<!-- SIDEBAR -->
<div class="sidebar">
    <h3 class="text-center text-white mb-4">CoreBank</h3>

    <a class="active" href="/dashboard">Dashboard</a>
    <a href="/accounts">Accounts</a>
    <a href="/transactions">Transactions</a>
    <a href="/loan/apply">Apply Loan</a>
    <a href="/credit-cards">Credit Cards</a>
    <a href="/bill-payments">Bill Payments</a>
    <a href="/logout">Logout</a>
</div>

<div style="margin-left:260px; padding:40px;">
    <h2>Edit Account</h2>

    <form th:action="@{'/accounts/update/' + ${account.id}}" method="post" class="w-50">

        <label class="form-label">Account Name</label>
        <input name="name" class="form-control"
               th:value="${account.accountName}" required>

        <label class="form-label mt-3">Account Type</label>
        <select name="type" class="form-control">
            <option th:selected="${account.type == 'SAVINGS'}" value="SAVINGS">Savings</option>
            <option th:selected="${account.type == 'CHECKING'}" value="CHECKING">Checking</option>
            <option th:selected="${account.type == 'BUSINESS'}" value="BUSINESS">Business</option>
        </select>

        <button class="btn btn-success mt-3">Save Changes</button>
        <a th:href="@{'/accounts/view/' + ${account.id}}" class="btn btn-secondary mt-3">Cancel</a>
    </form>
</div>

<style>
    /* SIDEBAR */
    .sidebar {
        width: 240px;
        height: 100vh;
        background: darkslategray;
        padding-top: 30px;
        position: fixed;
        top: 0;
        left: 0;
    }

    .sidebar a {
        display: block;
        padding: 12px 22px;
        text-decoration: none;
        color: #b3c5ff;
        font-size: 15px;
    }

    .sidebar a:hover,
    .sidebar .active {
        background: rgba(255,255,255,0.15);
        color: white;
        border-radius: 6px;
    }

</style>
</body>
</html>
